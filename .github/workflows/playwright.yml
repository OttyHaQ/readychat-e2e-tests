name: Playwright Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run tests against'
        required: true
        default: 'prod'
        type: choice
        options:
          - dev
          - qa
          - prod
  schedule:
    - cron: '0 13 * * *' 

# Sets permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium

    - name: Create environment files
      run: |
        echo "${{ secrets.ENV_DEV }}" > .env.dev
        echo "${{ secrets.ENV_QA }}" > .env.qa
        echo "${{ secrets.ENV_PROD }}" > .env.prod

    - name: Run Playwright tests
      env:
        env: ${{ github.event.inputs.environment || 'qa' }}
      run: npm test

    - name: Build observability dashboard
      if: always()
      run: |
        curl -sf "http://www.quickagent.live/test-history.json" -o playwright-report/test-history.json \
          || echo '[]' > playwright-report/test-history.json
        node scripts/build-dashboard.js

    - name: Upload HTML report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: test-results/
        retention-days: 30

    - name: Publish test results summary
      if: always()
      run: |
        echo "## Playwright Test Results" >> $GITHUB_STEP_SUMMARY
        echo "Environment: ${{ github.event.inputs.environment || 'qa' }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Report | Link |" >> $GITHUB_STEP_SUMMARY
        echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
        echo "| HTML Report | http://www.quickagent.live/ |" >> $GITHUB_STEP_SUMMARY
        echo "| Observability Dashboard | http://www.quickagent.live/dashboard.html |" >> $GITHUB_STEP_SUMMARY

  deploy-report:
    needs: test
    if: always() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    - name: Download report artifact
      uses: actions/download-artifact@v4
      with:
        name: playwright-report
        path: playwright-report

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact for Pages
      uses: actions/upload-pages-artifact@v3
      with:
        path: playwright-report

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
       