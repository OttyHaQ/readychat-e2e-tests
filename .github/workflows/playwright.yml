name: Playwright Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run tests against'
        required: true
        default: 'qa'
        type: choice
        options:
          - dev
          - qa
          - prod

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium

    - name: Create environment files
      run: |
        echo "${{ secrets.ENV_DEV }}" > .env.dev
        echo "${{ secrets.ENV_QA }}" > .env.qa
        echo "${{ secrets.ENV_PROD }}" > .env.prod

    - name: Run Playwright tests
      env:
        env: ${{ github.event.inputs.environment || 'qa' }}
      run: npx playwright test
      continue-on-error: true

    - name: Upload HTML report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: test-results/
        retention-days: 30

    - name: Publish test results summary
      if: always()
      run: |
        echo "## Playwright Test Results" >> $GITHUB_STEP_SUMMARY
        echo "Environment: ${{ github.event.inputs.environment || 'qa' }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Test execution completed. Check the artifacts for detailed reports." >> $GITHUB_STEP_SUMMARY
        if [ -f playwright-report/index.html ]; then
          echo "✅ HTML Report generated successfully" >> $GITHUB_STEP_SUMMARY
       